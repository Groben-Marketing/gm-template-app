name: Mirror to GitLab

on:
  push:
    branches: ['**']
    tags: ['**']
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to GitLab
        env:
          GL_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.event.repository.name }}"
          git remote add gitlab "https://oauth2:${GL_TOKEN}@gitlab.com/keithgroben/${REPO}.git"
          git push --force --all gitlab
          git push --force --tags gitlab